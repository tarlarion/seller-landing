<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Обрабатывайте заказы из зарубежных магазинов в 3–5 раз быстрее. Бот собирает карточку товара по ссылке за несколько секунд."
    />
    <title>БайерБот — больше заказов без найма помощников</title>
    <style>
      @font-face {
        font-family: "Geist Variable";
        font-style: normal;
        font-weight: 100 900;
        font-stretch: 75% 125%;
        font-display: swap;
        src: url("/fonts/geist-cyrillic.woff2") format("woff2-variations");
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;
      }

      @font-face {
        font-family: "Geist Variable";
        font-style: normal;
        font-weight: 100 900;
        font-stretch: 75% 125%;
        font-display: swap;
        src: url("/fonts/geist-latin.woff2") format("woff2-variations");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA,
          U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193,
          U+2212, U+2215, U+FEFF, U+FFFD;
      }

      html {
        font-family: "Geist Variable", system-ui, sans-serif;
      }
    </style>
    <link
      rel="preload"
      href="/fonts/geist-cyrillic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/geist-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="image"
      href="/heropicture-mobile.avif"
      type="image/avif"
      media="(max-width: 576px)"
    />
    <link
      rel="preload"
      as="image"
      href="/heropicture-mobile.webp"
      type="image/webp"
      media="(max-width: 576px)"
    />
    <link
      rel="preload"
      as="image"
      href="/heropicture.avif"
      type="image/avif"
      media="(min-width: 577px)"
    />
    <link
      rel="preload"
      as="image"
      href="/heropicture.webp"
      type="image/webp"
      media="(min-width: 577px)"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
